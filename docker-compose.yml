version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: customer_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: support
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d support"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: customer_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders_mcp:
    build:
      context: ./mcp_servers/orders
      dockerfile: Dockerfile
    container_name: customer_orders_mcp
    environment:
      - JWT_SECRET=your-secret-key
      - PORT=8001
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy

  crm_mcp:
    build:
      context: ./mcp_servers/crm
      dockerfile: Dockerfile
    container_name: customer_crm_mcp
    environment:
      - PORT=8002
    ports:
      - "8002:8002"

  tickets_mcp:
    build:
      context: ./mcp_servers/tickets
      dockerfile: Dockerfile
    container_name: customer_tickets_mcp
    environment:
      - PORT=8003
    ports:
      - "8003:8003"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customer_backend
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - JWT_SECRET=your-secret-key
      - POSTGRES_URL=postgresql+asyncpg://user:password@postgres:5432/support
      - REDIS_URL=redis://redis:6379/0
      - ORDERS_MCP_URL=http://orders_mcp:8001/mcp
      - CRM_MCP_URL=http://crm_mcp:8002/mcp
      - TICKETS_MCP_URL=http://tickets_mcp:8003/mcp
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-customer-support}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel_collector:4317
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orders_mcp:
        condition: service_started
      crm_mcp:
        condition: service_started
      tickets_mcp:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: customer_frontend
    environment:
      - BACKEND_URL=ws://backend:8000/ws/chat
      - JWT_SECRET=your-secret-key
    ports:
      - "8501:8501"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: customer_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

volumes:
  pgdata:
  redisdata:
